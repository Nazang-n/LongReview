<app-header></app-header>

<main class="main-content">

  <section class="section">
    <!-- Section Title Area -->
    <div class="mt-20 mb-5">
      <h2 class="section-title">มาใหม่</h2>
    </div>
    <div class="hero-slider">
      <button
        class="absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 bg-white/20 hover:bg-white/40 backdrop-blur-md border border-white/30 text-white rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 z-50 group"
        (click)="prevSlide()">
        <i class="pi pi-chevron-left text-xl group-hover:-translate-x-0.5 transition-transform"></i>
      </button>

      <div class="slide-content" *ngIf="newArrivals.length > 0" [routerLink]="['/game', newArrivals[currentSlide].id]"
        style="cursor: pointer;"> <img [src]="newArrivals[currentSlide].image" class="hero-img" alt="New Game">
        <div class="hero-overlay">
          <h3>{{newArrivals[currentSlide].title}}</h3>
        </div>
      </div>

      <button
        class="absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 bg-white/20 hover:bg-white/40 backdrop-blur-md border border-white/30 text-white rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 z-50 group"
        (click)="manualNext()">
        <i class="pi pi-chevron-right text-xl group-hover:translate-x-0.5 transition-transform"></i>
      </button>
    </div>
  </section>

  <section class="section">
    <h2 class="section-title">เกมที่ได้คะแนนรีวิวสูง</h2>
    <div class="scroll-container-wrapper">
      <button
        class="absolute left-0 top-1/2 -translate-y-1/2 -ml-5 w-10 h-10 bg-white hover:bg-gray-50 text-gray-800 shadow-lg rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 z-10 border border-gray-100"
        (click)="scrollList(-300)">
        <i class="pi pi-chevron-left"></i>
      </button>

      <div class="card-list" #cardList>
        <div class="game-card" *ngFor="let game of highRatedGames" [routerLink]="['/game', game.id]"
          style="cursor: pointer;">
          <div class="card-img-wrapper">
            <img [src]="game.image" alt="{{game.title}}">
          </div>
          <div class="card-body">
            <h3>{{game.title}}</h3>
            <div class="rating-row">
              <span class="platform">PC/Console</span>
              <span class="rating">{{game.rating}}</span>
            </div>
            <div class="tags">
              <span *ngFor="let tag of game.tags" class="tag">{{tag}}</span>
            </div>
          </div>
        </div>
      </div>

      <button
        class="absolute right-0 top-1/2 -translate-y-1/2 -mr-5 w-10 h-10 bg-white hover:bg-gray-50 text-gray-800 shadow-lg rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 z-10 border border-gray-100"
        (click)="scrollList(300)">
        <i class="pi pi-chevron-right"></i>
      </button>
    </div>
  </section>

</main>

<app-footer></app-footer>
