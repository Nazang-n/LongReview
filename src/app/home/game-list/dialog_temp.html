<!-- Remove Favorite Dialog -->
<p-dialog [(visible)]="showRemoveDialog" [modal]="true" [style]="{width: '500px'}" [draggable]="false" [resizable]="false">
    <ng-template pTemplate="header">
        <div class="flex items-center gap-3">
            <i class="pi pi-heart-fill text-red-600 text-2xl"></i>
            <span class="font-bold text-xl">ลบออกจากรายการโปรด</span>
        </div>
    </ng-template>
    <div class="py-4">
        <p class="text-gray-700 text-lg">
            คุณต้องการลบ <strong class="text-purple-600">{{ pendingRemoveGameTitle }}</strong> ออกจากรายการโปรดหรือไม่?
        </p>
    </div>
    <ng-template pTemplate="footer">
        <button (click)="cancelRemove()" class="px-4 py-2 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-lg transition-colors font-medium">
            ยกเลิก
        </button>
        <button (click)="confirmRemove()" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors font-medium">
            <i class="pi pi-heart-fill mr-2"></i>
            ลบออกจากรายการโปรด
        </button>
    </ng-template>
</p-dialog>

<app-footer></app-footer>
